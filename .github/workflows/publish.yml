name: Publish

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to Maven Central
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew :llm-typewriter:publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace

      - name: Decode sample signing keystore
        env:
          SAMPLE_SIGNING_KEYSTORE_BASE64: ${{ secrets.SAMPLE_SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SAMPLE_SIGNING_KEYSTORE_BASE64" | base64 -d > keystore.jks
          if [ ! -s keystore.jks ]; then
            echo "::error::keystore.jks is empty — secret SAMPLE_SIGNING_KEYSTORE_BASE64 is missing or invalid"
            exit 1
          fi

      - name: Assemble sample release APK
        env:
          SAMPLE_STORE_FILE: ${{ github.workspace }}/keystore.jks
          SAMPLE_STORE_PASSWORD: ${{ secrets.SAMPLE_STORE_PASSWORD }}
          SAMPLE_KEY_ALIAS: ${{ secrets.SAMPLE_KEY_ALIAS }}
          SAMPLE_KEY_PASSWORD: ${{ secrets.SAMPLE_KEY_PASSWORD }}
        run: ./gradlew :sample:androidApp:assembleRelease --stacktrace

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" sample/androidApp/build/outputs/apk/release/*.apk --generate-notes --verify-tag
