name: Sample app

on:
  push:
    branches: [ main ]
    paths:
      - 'sample/**'
      - 'llm-typewriter/**'
      - 'gradle/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - '.github/workflows/sample.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'sample/**'
      - 'llm-typewriter/**'
      - 'gradle/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - '.github/workflows/sample.yml'
  workflow_dispatch:

concurrency:
  group: sample-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-sample:
    name: Build sample APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew :sample:androidApp:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sample-app-debug-apk
          path: sample/androidApp/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error
