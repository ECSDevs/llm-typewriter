name: Sample app

on:
  push:
    branches: [ main ]
    paths:
      - 'sample/**'
      - 'llm-typewriter/**'
      - 'gradle/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - '.github/workflows/sample.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'sample/**'
      - 'llm-typewriter/**'
      - 'gradle/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - '.github/workflows/sample.yml'
  workflow_dispatch:

concurrency:
  group: sample-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-sample:
    name: Build sample APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        env:
          SAMPLE_SIGNING_KEYSTORE_BASE64: ${{ secrets.SAMPLE_SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SAMPLE_SIGNING_KEYSTORE_BASE64" | base64 -d > keystore.jks
          if [ ! -s keystore.jks ]; then
            echo "::error::keystore.jks is empty — secret SAMPLE_SIGNING_KEYSTORE_BASE64 is missing or invalid"
            exit 1
          fi

      - name: Assemble release APK
        env:
          SAMPLE_STORE_FILE: ${{ github.workspace }}/keystore.jks
          SAMPLE_STORE_PASSWORD: ${{ secrets.SAMPLE_STORE_PASSWORD }}
          SAMPLE_KEY_ALIAS: ${{ secrets.SAMPLE_KEY_ALIAS }}
          SAMPLE_KEY_PASSWORD: ${{ secrets.SAMPLE_KEY_PASSWORD }}
        run: ./gradlew :sample:androidApp:assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: sample-app-release-apk
          path: sample/androidApp/build/outputs/apk/release/*.apk
          retention-days: 14
          if-no-files-found: error
